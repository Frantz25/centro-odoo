[options]
; Clave maestra para el DB Manager / creación de bases
admin_passwd = centroManzan0

; Conexión a Postgres (en compose el host del servicio es "db")
db_host = db
db_port = 5432
db_user = odoo
; db_password NO se escribe aquí porque usamos PASSWORD_FILE por secreto

; Datos persistentes (debe coincidir con el volumen montado)
data_dir = /var/lib/odoo

; Addons: estándar + extra-addons montado
addons_path = /usr/lib/python3/dist-packages/odoo/addons,/mnt/extra-addons

; Recomendado en servidores (evita listar DBs públicamente)
list_db = False

; Fuerza a usar SOLO tu base (elige UNA de estas dos opciones)
db_name = cer_prod
; Si pones un reverse proxy (nginx/traefik), activa esto
; proxy_mode = True

db_password = centroManzan0
