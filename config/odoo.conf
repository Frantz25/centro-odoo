[options]
; Clave maestra para el DB Manager / creación de bases
; Definir vía entorno seguro en despliegue real
admin_passwd = CHANGE_ME_MASTER_PASSWORD

; Conexión a Postgres (en compose el host del servicio es "db")
db_host = db
db_port = 5432
db_user = odoo
; db_password NO se escribe aquí en producción
; usar PASSWORD_FILE/secret de Docker

data_dir = /var/lib/odoo
addons_path = /usr/lib/python3/dist-packages/odoo/addons,/mnt/extra-addons
list_db = False
db_name = cer_prod

; Solo para desarrollo local. En producción usar secret/env var.
db_password = CHANGE_ME_DB_PASSWORD
